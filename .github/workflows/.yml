            - name: Teleport Auth (Application Access)
  # You may pin to the exact commit or the version.
  # uses: teleport-actions/auth-application@a7be22024b65f177e216637d87a8c021546659a7
  uses: teleport-actions/auth-application@v2.0.6
  with:
    # Enables anonymous telemetry. See https://goteleport.com/docs/machine-id/reference/telemetry/ for more information.
    anonymous-telemetry: # optional
    # Specify the name of the application in Teleport you wish to generate credentials for.
    app: 
    # Specifies one or more trusted CAs to initially validate the identity of the Auth Server when connecting directly to it. This is not required for Teleport Cloud or when connecting via a Teleport Proxy
    ca-pins: # optional
    # Specify the length that the generated credentials should be valid for. Defaults to "1h"
    certificate-ttl: # optional
    # Disables the automatic setting of environment variables like`TELEPORT_IDENTITY_FILE` by the action. This can be useful in more complex workflows where multiple identities are being used.
    disable-env-vars: # optional
    # Specify the address of your Teleport Proxy.
    proxy: 
    # Specify the Teleport token to use to join.
    token: 
          
